worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Upload size limit (50 MB) ─────────────────────────────────────
    client_max_body_size 50M;

    # ── Upstream: Gunicorn ────────────────────────────────────────────
    upstream flask_app {
        server web:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Health endpoint (bypass proxy for quick checks) ───────────
        location = /health {
            proxy_pass         http://flask_app;
            proxy_set_header   Host $host;
            access_log off;
        }

        # ── Main app ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Allow long-running uploads
            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;
        }

        # ── Custom error pages ────────────────────────────────────────
        error_page 413 /413.json;
        location = /413.json {
            internal;
            return 413 '{"error":"File terlalu besar. Maksimum 50 MB."}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /5xx.json;
        location = /5xx.json {
            internal;
            return 503 '{"error":"Server sedang sibuk. Coba beberapa saat lagi."}';
            add_header Content-Type application/json;
        }
    }
}
